name: Auto-Update Jio M3U Playlist

on:
  schedule:
    # Runs at minute 0 past every 3rd hour
    - cron: '0 * * * *' 
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch: 

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository to access convert.py and meta.txt
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Run your conversion script
      - name: Run Conversion Script
        run: python jiotv.py

      # 4. Commit and push the new playlist.m3u back to the repo
      # 4. Commit and push the new playlist back to the repo
      # 4. Commit and push the new playlist back to the repo
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jiotv.m3u
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Automated update: Refresh Jio M3U playlist"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push failed, retrying ($i)..."
            sleep 5
          done
          echo "All retries failed."
          exit 1
