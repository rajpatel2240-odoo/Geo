name: Auto-Update Jio M3U Playlist

on:
  repository_dispatch:
    types: [trigger-jiotv-sync]

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Conversion Script
        run: |
          pip install aiohttp
          python jiotv.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jiotv.m3u
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Automated update: Refresh Jio M3U playlist"

          PUSHED=false
          for i in 1 2 3; do
            git pull origin main --rebase --strategy-option=theirs && git push origin main && PUSHED=true && break
            echo "Push failed, retrying ($i)..."
            sleep 5
          done

          if [ "$PUSHED" = false ]; then
            echo "All retries failed."
            exit 1
          fi

          echo "Push succeeded."
