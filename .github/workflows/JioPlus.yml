name: Auto Update JioPlus

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Python script
        run: |
          pip install cloudscraper
          python jioplus.py 

      - name: Commit and push generated M3U
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jioplus.m3u
          
          # This checks if there are any changes. If yes, it commits and pushes.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update M3U playlist" && git push)
