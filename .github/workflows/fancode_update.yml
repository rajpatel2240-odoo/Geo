name: Auto-Update Fancode M3U Playlist

on:
  repository_dispatch:
    types: [trigger-fancode-sync]

# Grants the bot permission to push files back to the repo
permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run M3U Generator Script
        run: python fancode.py 

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the specific file generated by your script
          git add fancode_1080p.m3u
          
          # If no changes are detected, exit the script cleanly (skips the git push step)
          git commit -m "Auto-update Fancode 1080p M3U playlist" || exit 0
          
          # Push the changes if the commit was successful
          git push
